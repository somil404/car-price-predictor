<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class = "bg-dark">
    <div class="container">
      <div class="row">
        <div class="card mt-50">
          <div class = "card-header" style = "text-align: center;">
            <h1>Prediction</h1>
          </div>

          <div class="card-body">
            <div class="col-12" style = "text-align: center;">
              <h5>This app predicts the price of the car you want to sell</h5>
            </div>
            <br>
            <form method="post" accept-charset="utf-8" id = "form">
              <div class = "col-md-10 form-group">
                <label><b>Select Company</b></label>
                <select class = "selectpicker form-control" id="company" required = "1" name = "company" onchange="load_car_models(this.id, 'car_models')">
                  {% for company in companies:%}
                  <option value="{{company}}">{{company}}</option>
                  {% endfor %}
                </select>
              </div>

              <div class = "col-md-10 form-group">
                <label><b>Select Model of the selected company</b></label>
                <select class = "selectpicker form-control" id="car_models" required = '1' name = "car_models">
                </select>
              </div>

              <div class = "col-md-10 form-group">
                <label><b>Select year</b></label>
                <select class = "selectpicker form-control" id="year" required = '1' name = "year">
                {% for year in years %}
                <option value="{{year}}">{{year}}</option>
                {% endfor %}
                </select>
              </div>

              <div class = "col-md-10 form-group">
                <label><b>Select Fuel type</b></label>
                <select class = "selectpicker form-control" id="fuel_type" required = '1' name = "fuel_type">
                {% for fuel in fuel_types: %}
                <option value="{{fuel}}">{{fuel}}</option>
                {% endfor %}
                </select>
              </div>

              <div class = "col-md-10 form-group">
                <label><b>Enter kms driven</b></label>
                <input type="text" name="kilo_driven" id="kilo_driven" class = "form-control">
              </div>

              <div class = "col-md-10 form-group">
                <button type="button" class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>
              </div>           
            </form>
            <br>
            <div class="row">
              <div class="col-12">
                <h4><span id = "prediction"></span></h4>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      function load_car_models(company_id, model_id){
        var company = document.getElementById(company_id);
        var car_models = document.getElementById(model_id);

        car_models.value = ""
        car_models.innerHTML = ""
        {% for company in companies %}
          if(company.value == "{{company}}"){
            {% for model in car_models %}
              {% if company in model %}
                newOption = document.createElement("option")
                newOption.value = "{{model}}"
                newOption.innerHTML = "{{model}}"
                car_models.options.add(newOption)
              {% endif %}
            {% endfor %}
          }
        {% endfor %}

      }
      function form_handler(event){
        event.preventDefault();
      }
      function send_data(){
        document.getElementById('form').addEventListener("submit", form_handler);

        var fd = new FormData(document.getElementById('form'))
        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true)
        document.getElementById('prediction').innerHTML = "Wait a minute...."
        xhr.onreadystatechange = function(){
          if(xhr.readyState == XMLHttpRequest.DONE){
            document.getElementById('prediction').innerHTML = xhr.responseText+" rs."
          }
        }

        xhr.onload = function(){};
        xhr.send(fd);
      }

    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
